name: plugin-validate

# Validates the marketplace manifest and each plugin.json parses as JSON
# with the required fields. Catches malformed manifests before they reach users.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json + every plugin.json
        run: |
          set -euo pipefail
          fail=0

          echo "::group::marketplace"
          node -e "const m = require('./.claude-plugin/marketplace.json'); \
            if (!m.name) throw new Error('marketplace missing name'); \
            if (!Array.isArray(m.plugins)) throw new Error('marketplace.plugins must be array'); \
            for (const p of m.plugins) { \
              if (!p.name) throw new Error('plugin missing name'); \
              if (!p.source) throw new Error('plugin ' + p.name + ' missing source'); \
            } \
            console.log('marketplace ok — ' + m.plugins.length + ' plugins')" || fail=1
          echo "::endgroup::"

          while IFS= read -r manifest; do
            plugin_dir="$(dirname "$(dirname "$manifest")")"
            echo "::group::$plugin_dir"
            node -e "const p = require('./$manifest'); \
              if (!p.name) throw new Error('missing name'); \
              if (!p.version) throw new Error('missing version'); \
              if (!p.description) throw new Error('missing description')" || fail=1
            echo "::endgroup::"
          done < <(find . -path './*/.claude-plugin/plugin.json' -not -path './node_modules/*' | sort)

          if [ "$fail" -ne 0 ]; then
            echo "::error::plugin validation failed — see grouped logs above"
            exit 1
          fi
